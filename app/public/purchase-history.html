<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="/css/style.css" rel="stylesheet">
    <title>Purchase History</title>
</head>
<body class="d-flex flex-column min-vh-100">
    <div class="techx-navbar">
      <img src="/Techx.png" width="150" height="100" alt="TechX logo">

      <div class="techx-nav-right">
        <a class="techx-nav-link" href="/home">Home</a>
        <a class="techx-nav-link" href="/Polls.html">Polls</a>
        <a class="techx-nav-link" href="/tech">Tech</a>
        <a class="techx-nav-link" href="/Review">Leave a review</a>
        <a class="techx-nav-link" href="/my-reviews">My reviews</a>
        <a class="techx-nav-link" href="/shopping-cart">Shopping Cart</a>
        <span></span>
        <div id="loginFormContainer" class="auth">
          <form id="loginForm" class="techx-nav-form">
            <input type="text" placeholder="username" name="username" required>
            <input type="password" placeholder="password" name="password" required>
            <input type="submit" value="Login">
          </form>

          <a class="techx-signup-btn" href="/signup.html">Sign Up</a>
        </div>
      </div>
    </div>

    <div class="container bg-light flex-grow-1 mb-4">
        <h1 class="mt-4 mb-4">Purchase History</h1>
        <div id="orderHistory">
            <!-- Order history will be loaded here -->
        </div>
    </div>

    <script src="/js/login-form.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        // Load purchase history
        async function loadPurchaseHistory() {
            try {
                const response = await fetch('/api/orders');
                const data = await response.json();
                displayOrders(data.orders);
            } catch (error) {
                console.error('Error loading purchase history:', error);
            }
        }

        function displayOrders(orders) {
            const historyContainer = document.getElementById('orderHistory');

            if (orders.length === 0) {
                historyContainer.innerHTML = '<p>You have no purchase history.</p>';
                return;
            }

            const container = document.createElement('div');

            orders.forEach(order => {
                const orderCard = document.createElement('div');
                orderCard.className = 'card mb-3';
                orderCard.innerHTML = `
                    <div class="card-header">
                        <h5 class="mb-0">Order #${order.orderNumber} - ${new Date(order.CreatedAt).toLocaleDateString()}</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Quantity</th>
                                    <th>Price</th>
                                    <th>Subtotal</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${order.items.map(item => `
                                    <tr>
                                        <td>${item.ProductName}</td>
                                        <td>${item.Quantity}</td>
                                        <td>$${Number(item.Price).toFixed(2)}</td>
                                        <td>$${(Number(item.Price) * Number(item.Quantity)).toFixed(2)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <div class="text-end">
                            <strong>Total: $${Number(order.Total).toFixed(2)}</strong>
                        </div>
                    </div>
                `;
                container.appendChild(orderCard);
            });

            historyContainer.innerHTML = '';
            historyContainer.appendChild(container);
        }

        loadPurchaseHistory();
    </script>
</body>
</html>
