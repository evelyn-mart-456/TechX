<!DOCTYPE html>
<html>
<head>
<style>
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
}
body{
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #19d7f8, #fd00da);

} 
.topnav-right {
float: right;
border: 2px solid  transparent; 
border-radius: 20px;
background-image: linear-gradient(#AFDBF5, #AFDBF5), radial-gradient(circle at top left, #fd00da, #19d7f8);
background-origin: border-box; 
background-clip: content-box, border-box;
}
.poll {
  width: 300px;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}  
.poll1{
 width: 300px;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
}
.container {
  display: flex;
  justify-content: space-between;
  padding: 40px;
}

</style> 
</head>
<body>
<div class = "navbar">
<Img src= "Techx.png" width ="150" height ="100">
<div class="topnav-right">
<a style = "padding-right: 20px; padding-left: 20px; padding: 10px 25px 10px 25px; color: black;" href = "home.html">Home</a>
<a style = "padding-right: 20px; padding: 10px 25px 10px 25px; color: black;" href = "about.html">About</a> 
</div> 
</div>
<div class= "container">
<div class="poll"> 
  <h3>Which tech brand do you prefer?</h3>
  <form id="pollA" onsubmit="voteBrand(event)">
      <label>
        <input type="radio" name="techbrand" value="Samsung"> Samsung
      </label><br>
      <label>
        <input type="radio" name="techbrand" value="Apple"> Apple
      </label><br>
      <label>
        <input type="radio" name="techbrand" value="Windows"> Windows
      </label><br>
      <button type="submit">Vote</button>
  </form>
  <div id="brandResults"></div>
</div>

<div class="poll1">
  <h3>Who is known as the father of the computer?</h3>
  <form id="pollB" onsubmit="voteFather(event)">
      <label>
        <input type="radio" name="father" value="Babbage"> Charles Babbage
      </label><br>
      <label>
        <input type="radio" name="father" value="Sandler"> Adam Sandler
      </label><br>
      <label>
        <input type="radio" name="father" value="Jobs"> Steve Jobs
      </label><br>
      <button type="submit">Vote</button>
  </form>
  <div id="fatherResults"></div>
</div>
 </div>
<script>

async function voteBrand(event){
    event.preventDefault(); // prevent page reload
    let selected = document.querySelector('input[name="techbrand"]:checked');
    if(!selected){ alert("Please select an option"); return; }

    const response = await fetch("/votepoll", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ PollID: "techBrand", OptionID: selected.value })
    });
    const data = await response.json();
    showBrandResults(data.results);
}

async function voteFather(event){
    event.preventDefault(); // prevent page reload
    let selected = document.querySelector('input[name="father"]:checked');
    if(!selected){ alert("Please select an option"); return; }

    const response = await fetch("/votepoll", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ PollID: "father", OptionID: selected.value })
    });
    const data = await response.json();
    showFatherResults(data.results);
}

function showBrandResults(results){
    if(!results) return;
    let total = results.reduce((sum,r) => sum + r.Votes, 0);
    let html = "";
    results.forEach(r => {
        let percent = total ? ((r.Votes/total)*100).toFixed(1) : 0;
        html += `${r.OptionName} (${r.Votes} votes - ${percent}%)<br>
        <div style="background:#19d7f8;height:15px;width:${percent}%"></div><br>`;
    });
    document.getElementById("brandResults").innerHTML = html;
}

function showFatherResults(results){
    if(!results) return;
    let total = results.reduce((sum,r) => sum + r.Votes, 0);
    let html = "";
    results.forEach(r => {
        let percent = total ? ((r.Votes/total)*100).toFixed(1) : 0;
        html += `${r.OptionName} (${r.Votes} votes - ${percent}%)<br>
        <div style="background:#fd00da;height:15px;width:${percent}%"></div><br>`;
    });
    document.getElementById("fatherResults").innerHTML = html;
}

// Optional: Load results on page load
async function loadResults(){
    let res = await fetch("/voted?PollID=techBrand");
    let data = await res.json();
    if(data.results) showBrandResults(data.results);
    res = await fetch("/voted?PollID=father");
    data = await res.json();
    if(data.results) showFatherResults(data.results);
}

loadResults();

</script>
</body>
</html>
