<div class= "container">
<div class="poll"> 
  <h3>Which tech brand do you prefer?</h3>
  <form id="pollA" onsubmit="voteBrand(event)">
      <label>
        <input type="radio" name="techbrand" value="Samsung"> Samsung
      </label><br>
      <label>

      </label><br>

<div class="poll1">
  <h3>Who is known as the father of the computer?</h3>
  <form id="pollB" onsubmit="voteFather(event)">
      <label>
        <input type="radio" name="father" value="Babbage"> Charles Babbage
      </label><br>
      <label>

      </label><br>

 <div class="center-section">
  <div class="poll">
  <h3>Create Your Own Poll</h3>

  <input type="text" id="newQuestion" placeholder="Enter your question"><br><br>

  <input type="text" class="newOption" placeholder="Option 1"><br>
  <input type="text" class="newOption" placeholder="Option 2"><br>

<div id="userPolls"></div>
 <script src="/js/login-form.js"></script>
<script>

async function voteBrand(event){
    event.preventDefault(); // prevent page reload
    let selected = document.querySelector('input[name="techbrand"]:checked');
    if(!selected){ alert("Please select an option"); return; }

    const response = await fetch("/votepoll", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ PollID: "techBrand", OptionID: selected.value })
    });
    const data = await response.json();
    showBrandResults(data.results);
}

async function voteFather(event){
    event.preventDefault(); // prevent page reload
    let selected = document.querySelector('input[name="father"]:checked');
    if(!selected){ alert("Please select an option"); return; }

    const response = await fetch("/votepoll", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ PollID: "father", OptionID: selected.value })
    });
    const data = await response.json();
    showFatherResults(data.results);
}

function showBrandResults(results){
    if(!results) return;
    let total = results.reduce((sum,r) => sum + r.Votes, 0);
    let html = "";
    results.forEach(r => {
        let percent = total ? ((r.Votes/total)*100).toFixed(1) : 0;
        html += `${r.OptionName} (${r.Votes} votes - ${percent}%)<br>
        <div style="background:#19d7f8;height:15px;width:${percent}%"></div><br>`;
    });
    document.getElementById("brandResults").innerHTML = html;
}

function showFatherResults(results){
    if(!results) return;
    let total = results.reduce((sum,r) => sum + r.Votes, 0);
    let html = "";
    results.forEach(r => {
        let percent = total ? ((r.Votes/total)*100).toFixed(1) : 0;
        html += `${r.OptionName} (${r.Votes} votes - ${percent}%)<br>
        <div style="background:#fd00da;height:15px;width:${percent}%"></div><br>`;
    });
    document.getElementById("fatherResults").innerHTML = html;
}

// Optional: Load results on page load
async function loadResults(){
    let res = await fetch("/voted?PollID=techBrand");
    let data = await res.json();
    if(data.results) showBrandResults(data.results);
    res = await fetch("/voted?PollID=father");
    data = await res.json();
    if(data.results) showFatherResults(data.results);
}

loadResults();

async function loadUserPolls() {
    const response = await fetch("/getpolls");
    const data = await response.json();

    let container = document.getElementById("userPolls");
    container.innerHTML = "";

    data.polls.forEach(poll => {
        let html = `<div class="poll"><h3>${poll.question}</h3>`;

        poll.options.forEach(opt => {
            html += `
                <button onclick="voteUserPoll('${poll.id}', '${opt.OptionID}')">
                    ${opt.OptionName} (${opt.Votes})
                </button><br>
            `;
        });

        html += "</div><br>";
        container.innerHTML += html;
    });
}

async function voteUserPoll(pollId, optionId) {
    const response = await fetch("/votepoll", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            PollID: pollId,
            OptionID: optionId
        })
    });

    await response.json();
    loadUserPolls(); // refresh after voting
}

loadUserPolls();

// Create poll function with correct try/catch
    async function createPoll() {
      const question = document.getElementById("newQuestion").value.trim();
      const optionInputs = document.querySelectorAll(".newOption");
      const options = [];

      optionInputs.forEach(input => {
        if (input.value.trim() !== "") options.push(input.value.trim());
      });

      if (!question || options.length < 2) {
        alert("Enter a question and at least 2 options");
        return;
      }

      try {
       const response = await fetch("/createpoll", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ question, options })
});

        if (!response.ok) {
          const errData = await response.json();
          alert("Failed to create poll: " + (errData.error || "Unknown error"));
          return;
        }

        const data = await response.json();
        console.log("Poll created:", data);
        alert("Poll created successfully!");
        loadUserPolls();

      } catch (err) {
        console.error("Fetch error:", err);
        alert("Failed to create poll: Network or server error");
      }
    }

  

</script>
