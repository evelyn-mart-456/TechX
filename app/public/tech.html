<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <div class="techx-navbar">
      <img src="/Techx.png" width="150" height="100" alt="TechX logo">

      <div class="techx-nav-right">
        <a class="techx-nav-link" href="/home">Home</a>
        <a class="techx-nav-link" href="/Polls.html">Polls</a>
        <a class="techx-nav-link" href="/tech">Tech</a>
        <a class="techx-nav-link" href="/Review">Leave a review</a>
        <a class="techx-nav-link" href="/shopping-cart">Shopping Cart</a>
        <span></span>
        <div id="loginFormContainer" class="auth">
          <form id="loginForm" class="techx-nav-form">
            <input type="text" placeholder="username" name="username" required>
            <input type="password" placeholder="password" name="password" required>
            <input type="submit" value="Login">
          </form>

          <a class="techx-signup-btn" href="/signup.html">Sign Up</a>
        </div>
      </div>
    </div>

    <div class="container-fluid bg-light flex-grow-1 d-flex flex-column p-0">
        <div class="d-md-none mb-3">
            <button class="navbar-toggler navbar-light"
                    data-bs-toggle="collapse"
                    data-bs-target="#categorySidebar"
                    aria-controls="categorySidebar"
                    aria-expanded="false"
                    aria-label="Toggle categories">
                    ☰ Categories
            </button>
        </div>
            <div class="row g-0 flex-grow-1">
            <div class="col-md-2 bg-primary-subtle collapse d-md-block p-0" id="categorySidebar">
                <div class="list-group list-group-flush" id="categoryList">
                    <a href="/tech" id="main-link" class="list-group-item list-group-item-action text-light bg-primary active">All Tech</a>
                </div>
            </div>
            <div class="col-md-10 p-4">
                <div class="row g-4" id="productGrid"></div>
            </div>
        </div>
    </div>
    <script>
        function loadProductCard(product) {
            const card = `
            <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                <div class="card h-100">
                    <img src="/product-images/${product.ProductImage}" class="card-img-top" alt="...">
                    <div class="card-body">
                        <a class="link-underline-light" href="/product/${product.ProductID}"><h5 class="card-title">${product.ProductName}</h5></a>
                        <p class="card-text">${product.ProductDesc.slice(0, 60)}</p>
                        <div class="d-flex flex-wrap align-items-center gap-2">
                            <a href="${product.ProductLink}" class="btn btn-primary">Source</a>
                            <button type="button" class="btn btn-success add-to-cart-btn" data-productid="${product.ProductID}">Add to Cart</button>
                            <span class="ms-auto fw-bold">$${product.RetailPrice}</span>
                        </div>
                    </div>
                </div>
            </div>
            `;

            return card;
        }

        const parts = window.location.pathname.split('/').filter(Boolean);
        const categoryId = parts[1] ?? null;
        const categoryList = document.getElementById("categoryList");
        const productGrid = document.getElementById("productGrid");

        function loadCategories(categories) {
            if(categoryId)
                document.getElementById("main-link").classList.remove("active");

            categories.forEach(category => {
                const isActive = Number(categoryId) === category.CategoryID ? "active" : "";
                const categoryLink = `
                    <a href="/tech/${category.CategoryID}" class="list-group-item list-group-item-action text-light bg-primary ${isActive}">${category.Name}</a>
                `;

                categoryList.insertAdjacentHTML("beforeend", categoryLink);
            });
        }
        
        async function getProducts() {
            const res = await fetch('/get-products');
            const data = await res.json();

            loadCategories(data.categories);

            data.products.forEach(product => {
                if(categoryId && Number(categoryId) === product.CategoryID) {
                    productGrid.insertAdjacentHTML("beforeend", loadProductCard(product));
                } else if(!categoryId){
                    productGrid.insertAdjacentHTML("beforeend", loadProductCard(product));
                }
            });
        }

        productGrid.addEventListener('click', async (event) => {
            const button = event.target.closest('.add-to-cart-btn');
            if (!button) return;

            const productId = button.dataset.productid;
            const sessionRes = await fetch('/api/session');
            const session = await sessionRes.json();
            if (!session.loggedIn) {
                alert('Please log in to add items to cart.');
                return;
            }

            try {
                const addRes = await fetch('/api/cart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId, quantity: 1 })
                });
                const addData = await addRes.json();
                if (addData.success) {
                    alert('Item added to cart!');
                } else {
                    alert('Failed to add item to cart: ' + (addData.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Failed to add item to cart:', error);
                alert('Failed to add item to cart. Please try again.');
            }
        });

        getProducts();

    </script>
    <script src="/js/login-form.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
