<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="/css/style.css" rel="stylesheet">
    
</head>
<body class="d-flex flex-column min-vh-100">
    <div class="techx-navbar">
      <img src="/Techx.png" width="150" height="100" alt="TechX logo">

      <div class="techx-nav-right">
        <a class="techx-nav-link" href="/home">Home</a>
        <a class="techx-nav-link" href="/Polls.html">Polls</a>
        <a class="techx-nav-link" href="/tech">Tech</a>
        <a class="techx-nav-link" href="/Review">Leave a review</a>
        <a class="techx-nav-link" href="/purchase-history">Purchase History</a>
        <span></span>
        <div id="loginFormContainer" class="auth">
          <form id="loginForm" class="techx-nav-form">
            <input type="text" placeholder="username" name="username" required>
            <input type="password" placeholder="password" name="password" required>
            <input type="submit" value="Login">
          </form>

          <a class="techx-signup-btn" href="/signup.html">Sign Up</a>
        </div>
      </div>
    </div>

    <div class="container bg-light flex-grow-1 mb-4">
        <div class="row mt-4">
            <div class="col">
                <div class="card">
                <div class="card-header h5 mb-0 fw-bold text-bg-dark" id="discussionTitle"></div>
                <div class="px-3 pb-3">
                    <table class="table">
                        <tbody id="discussionPosts">

                        </tbody>
                    </table>
                </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Delete</h5>
            </div>
            <div class="modal-body">
                Are you sure you want to delete this post? This action cannot be reversed
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="cancelDeleteBtn">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
            </div>
        </div>
    </div>

    <script src="/js/login-form.js" defer></script>
    <script>
        const parts = window.location.pathname.split("/").filter(Boolean);
        let productId, threadId;

        if(parts.length === 4 && parts[0] === "product" && parts[2] === "thread") {
            productId = parts[1];
            threadId = parts[3];
        }

        const postTable = document.getElementById("discussionPosts");

        async function getSession() {
            const res = await fetch('/api/session');
            const session = await res.json();

            return session;
        }

        async function loadPosts() {
            const session = await getSession();

            const res = await fetch(`/product/${productId}/posts/${threadId}`);
            const data = await res.json();

            document.getElementById("discussionTitle").innerText = data.posts[0].Title;

            if(session.loggedIn) {
            }

            data.posts.forEach(post => {
                const postRow = document.createElement("tr");
                
                postRow.innerHTML = `
                    <td class="text-nowrap border-right">
                        <div><a href="/product/${post.ProductID}/thread/${post.ThreadID}">${post.Title}</a></div>
                        <div>by ${post.Username} on ${new Date(post.CreationDate).toLocaleString()}</div>
                    </td>
                    <td class="w-100">
                        <div>
                            ${
                            (session.moderatedBoards && session.moderatedBoards.includes(Number(productId))) || post.UserID === session.userID ?
                            `<span style="float:right">
                                <button class="btn btn-link p-0 ms-1 edit-post-btn" data-post-id="${post.PostID}" title="Edit">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <button class="btn btn-link p-0 ms-1 delete-btn" data-post-id="${post.PostID}" title="Delete">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </span>
                            ` : ''}
                            ${post.Text}
                        </div>
                        <div ${!post.ModificationDate ? "hidden" : ""}>${new Date(post.ModificationDate).toLocaleString()}</div>
                    </td>
                `;

                postTable.appendChild(postRow);
            });

            let selectedPost = null;

            document.querySelectorAll('.edit-post-btn').forEach(btn => {
                btn.addEventListener('click', event => {
                    selectedPost = btn.dataset.postId;
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', event => {
                    selectedPost = btn.dataset.postId;

                    const modal = new bootstrap.Modal(document.getElementById('confirmDeleteModal'));
                    modal.show();
                });
            });

            document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
                if(!selectedPost) return;

                fetch(`/product/${productId}/post/${selectedPost}`, { method: 'DELETE'})
                    .then(() => location.reload());
            });

            if(session.loggedIn) {
                const postFormRow = document.createElement("tr");

                postFormRow.innerHTML = `
                    <td>
                        <div>Reply to Post</div>
                        <form action="/product/${productId}/thread/${threadId}" method="POST">
                            <textarea class="form-control mb-2" name="message"></textarea>
                            <input type="submit" value="Submit" class="btn btn-primary" />
                        </form>
                    </td>
                `;

                postTable.appendChild(postFormRow);
            }
        }

        if(productId && threadId)
            loadPosts();
        else {
            postTable.innerHTML = `
                <td><div class="text-danger">You have reached an invalid thread.</div></td>
            `;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
