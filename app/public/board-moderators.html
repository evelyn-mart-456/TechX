<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title>Board Moderators</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      .preview-img {
        height: 80px;
        width: auto;
        max-width: 120px;
        object-fit: contain;
      }
      .desc-textarea {
        resize: vertical;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container d-flex justify-content-center">
        <a class="navbar-brand" href="/staff">Admin panel</a>
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/staff">Staff</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/product-management">Product Management</a> 
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/board-moderators">Board Moderators</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/staff-logout">Logout</a>
          </li>
        </ul>
      </div>
    </nav>
    <main>
      <div class="container mt-5">
        <table class="table table-sm fs-6 text-nowrap">
          <thead>
            <tr class="table-dark">
              <th>User</th>
              <th>Boards</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="moderatorBody">

          </tbody>
        </table>
        <p id="moderatorError" class="text-danger"></p>
      </div>
    </main>
  </body>
  <script>
    /**
     * Moderator Table functions
     */
    const modBody = document.getElementById("moderatorBody");
    const modError = document.getElementById("moderatorError");

    let users = [];
    let moderators = [];
    let boards = [];
    
    function buildModRow(moderator) {
      const row = document.createElement('tr');

      row.innerHTML = `
        <td><span name="name" data-user-id="${moderator.UserID}">${moderator.Username}</td>
        <td>
          <select multiple size="5" name="boards">
              ${boards.map(board =>
                `<option value="${board.ProductID}"  ${
                  moderators.some(m => 
                    m.UserID === moderator.UserID && 
                    m.ProductID === board.ProductID
                    ) ? 'selected' : ''
                  }>${board.ProductName}</option>`
              ).join('')}
          </select>
        </td>
        <td>
          <input name="update" value="Update" type="submit" class="btn btn-success">
          <input name="delete" value="Delete" type="submit" class="btn btn-danger">
        </td>
      `;

      return row;
    }

    async function loadModerators() {
      modBody.innerHTML = '';
      modError.innerText = '';

      const res = await fetch('/moderators');
      const data = await res.json();

      boards = data.products;
      moderators = data.moderators;
      users = data.users;

      const seen = new Set();

      moderators.forEach(moderator => {
        if(seen.has(moderator.UserID)) return;
        seen.add(moderator.UserID);

        const row = buildModRow(moderator);
        modBody.appendChild(row);
      });

      const addRow = document.createElement("tr");

      addRow.innerHTML = `
        <td>
          <select name="name">
            <option value="" selected disabled>Select a User</option>
            ${users
                .filter(user => !moderators.some(m => m.UserID === user.UserID))
                .map(user => `<option value="${user.UserID}">${user.Username}</option>`)
                .join('')
              }
          </select>
        </td>
        <td>
          <select multiple size="5" name="boards">
              ${boards.map(board =>
                `<option value="${board.ProductID}">${board.ProductName}</option>`
              ).join('')}
          </select>
        </td>
        <td><input name="add" value="Add" class="btn btn-success" /></td>
      `;

      modBody.appendChild(addRow);
    }

    loadModerators();

    async function createModRow(row) {
      const userID = row.querySelector('[name="name"]').value;
      const productIDs = Array.from(row.querySelector('[name="boards"]').selectedOptions).map(opt => opt.value);

      if(!userID) {
        return {ok: false, message: "Error: you must select a user."};
      }

      const moderators = [];

      productIDs.forEach(productID => {
        moderators.push({userID, productID});
      });

      const res = await fetch("/moderators", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ moderators })
      });

      const data = await res.json();

      if(data.success)
        return {ok: true};
      else
        return {ok: false, message: "Error: Adding moderator failed."};
    }

    async function updateModRow(row) {
      const userID = row.querySelector('[name="name"]').dataset.userId;
      const productIDs = Array.from(row.querySelector('[name="boards"]').selectedOptions).map(opt => opt.value);

      const moderators = [];

      productIDs.forEach(productID => {
        moderators.push({userID, productID});
      });

      const res = await fetch("/moderators", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ userID, moderators })
      });

      const data = await res.json();

      return data.success;
    }

    async function deleteModRow(row) {
      const userID = row.querySelector('[name="name"]').dataset.userId;

      const res = await fetch("/delete-moderator", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ userID })
      });

      const data = await res.json();
      return data.success;
    }

    modBody.addEventListener("click", async (event) => {
        const button = event.target;

        if(button.name === "update") {
          const row = button.closest("tr");
          const ok = await updateModRow(row);
          if(ok) 
            await loadModerators();
          else
            modError.innerText = "Error: updating moderator failed.";
        }

        if(button.name === "add") {
          const row = button.closest("tr");
          const result = await createModRow(row);
          if(result.ok) 
            await loadModerators();
          else
            modError.innerText = result.message;
        }

        if(button.name === "delete") {
          const row = button.closest("tr");
          const ok = await deleteModRow(row);
          if(ok) 
            await loadModerators();
          else
            modError.innerText = "Error: removing moderator failed.";
        }

      });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
