<!DOCTYPE html>
<html>
<head>
  <link href="/css/style.css" rel="stylesheet">
<style>
  .center-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 120px);
    padding: 20px;
  }

  .review-container {
    background: white;
    padding: 40px;
    width: 350px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
  }

  .review-container h2 {
    margin-bottom: 20px;
  }

  .review-container input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  .review-container button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #42455a;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  .review-container button:hover {
    background: #2f3140;
  }
</style>
</head>
<body>

  <div class="techx-navbar">
      <img src="/Techx.png" width="150" height="100" alt="TechX logo">

      <div class="techx-nav-right">
        <a class="techx-nav-link" href="/home">Home</a>
        <a class="techx-nav-link" href="Polls.html">Polls</a>
        <a class="techx-nav-link" href="/tech">Tech</a>
        <a class="techx-nav-link" href="/Review">Leave a review</a>
        <span></span>
        <div id="loginFormContainer" class="auth">
          <form id="loginForm" class="techx-nav-form">
            <input type="text" placeholder="username" name="username" required>
            <input type="password" placeholder="password" name="password" required>
            <input type="submit" value="Login">
          </form>

          <a class="techx-signup-btn" href="signup.html">Sign Up</a>
        </div>
      </div>
    </div>

  <div class="center-wrapper">
    <div class="review-container">
        <h2>Create Your Review</h2>
        <form id = "reviewForm"> Create your review here
        <input name="product_name" type="text" placeholder="Product Name" required>
        <input name="rating" type="number" placeholder="Rating (1-5)" min="1" max="5" required>
        <input name="review_text" type="text" placeholder="Your Review">
        <button type = "submit">Submit Review</button>
        </form>
    </div>
  </div>
</body>

<script src="/js/login-form.js" defer></script>
<script>
  const reviewForm = document.getElementById('reviewForm');
  reviewForm.addEventListener('submit', async function(event) {
    event.preventDefault();

    const formData = new FormData(event.target);

    if(!formData.get('product_name') || !formData.get('rating') || formData.get('rating') < 1 || formData.get('rating') > 5) {
      alert('Please fill in all required fields.');
      return; 
    }

    console.log('Submitting review:', Object.fromEntries(formData));

    try {
      const res = await fetch('/submit_review', {
        method: 'POST',
        headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              product_name: formData.get('product_name'),
              review_text: formData.get('review_text'),
              rating: formData.get('rating')
            })
      });

      const data = await res.json();
      console.log("Server response:", data);

      if (data.success) {
        alert(data.message);
      } else {
        alert(data.message || "An unknown error occurred while submitting your review.");
      }
    } catch (error) {
      console.error('Error submitting review:', error);
      alert('An error occurred while submitting your review. Please try again later.');
    }
  });
</script>
</html>
