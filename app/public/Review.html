<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="/css/style.css" rel="stylesheet">
<style>
  .center-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 120px);
    padding: 20px;
  }

  .review-container {
    background: white;
    padding: 40px;
    width: 350px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
  }

  .review-container h2 {
    margin-bottom: 20px;
  }

  .review-container input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  .review-container button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #42455a;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  .review-container button:hover {
    background: #2f3140;
  }
</style>
</head>
<body>

  <div class="navbar navbar-expand-lg d-flex align-items-center justify-content-between px-4 py-3">
      <img src="/Techx.png" width="150" height="100" alt="TechX logo">
      <button class="navbar-toggler ms-auto techx-toggler" 
              type="button" 
              data-bs-toggle="collapse" 
              data-bs-target="#techxNav" 
              aria-controls="techxNav" 
              aria-expanded="false" 
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div id="techxNav" class="collapse navbar-collapse">
        <div class="techx-nav-right position-relative d-flex flex-column flex-lg-row align-items-center gap-1 gap-xl-3 ms-auto py-4 px-1 rounded-4">
          <div class="d-flex flex-column flex-lg-row align-items-center gap-1 gap-xl-3">
            <a class="nav-link px-2 py-2 text-dark" href="/home">Home</a>
            <a class="nav-link px-2 py-2 text-dark" href="/Polls.html">Polls</a>
            <a class="nav-link px-2 py-2 text-dark" href="/tech">Tech</a>
            <a class="nav-link px-2 py-2 text-dark" href="/Review">Leave a review</a>
            <a class="nav-link px-2 py-2 text-dark" href="/my-reviews">My reviews</a>
            <a class="nav-link px-2 py-2 text-dark" href="/News-Article.html">News Article</a>
            <a class="nav-link px-2 py-2 text-dark" href="/purchase-history">Purchase History</a>
            <a class="nav-link px-2 py-2 text-dark" href="/shopping-cart"><span class="d-flex align-items-center justify-content-center rounded-circle bg-white">🛒</span></a>
          </div>
          <div id="loginFormContainer" class="d-flex align-items-center">
            <form id="loginForm" class="d-flex flex-row align-items-center gap-1 gap-xl-2 m-0">
              <input class="form-control form-control-sm rounded techx-nav-input" type="text" placeholder="username" name="username" required>
              <input class="form-control form-control-sm rounded techx-nav-input" type="password" placeholder="password" name="password" required>
              <input class="btn btn-sm rounded-3 techx-gradient-btn" type="submit" value="Login">
              <a class="btn btn-sm px-3 py-1 rounded-pill techx-gradient-btn" href="/signup.html">Sign Up</a>
            </form>
          </div>
          <div id="loginError"
               class="text-danger position-absolute end-0 pe-3 text-nowrap"
               style="bottom: 0rem;">
          </div>
        </div>
      </div>
    </div>

  <div class="center-wrapper">
    <div class="review-container">
        <h2>Create Your Review</h2>
        <form id = "reviewForm" enctype="multipart/form-data"> Create your review here
        <select name="product_id" required>
          <option value="">Select a product</option>
        </select>
        <input name="rating" type="number" placeholder="Rating (1-5)" min="1" max="5" required>
        <input name="review_text" type="text" placeholder="Your Review">
        <input name="review_image" type="file" accept="image/*">
        <button type = "submit">Submit Review</button>
        </form>
    </div>
  </div>
</body>

<script src="/js/login-form.js" defer></script>
<script>
  // Populate product dropdown
  fetch('/api/products')
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        const select = document.querySelector('select[name="product_id"]');
        data.products.forEach(product => {
          const option = document.createElement('option');
          option.value = product.ProductID;
          option.textContent = product.ProductName;
          select.appendChild(option);
        });
      }
    })
    .catch(err => console.error('Failed to load products:', err));

  const reviewForm = document.getElementById('reviewForm');
  reviewForm.addEventListener('submit', async function(event) {
    event.preventDefault();

    const formData = new FormData(event.target);
    const rating = parseInt(formData.get('rating'));

    if(!formData.get('product_id') || !rating || rating < 1 || rating > 5) {
      alert('Please fill in all required fields and ensure rating is between 1 and 5.');
      return; 
    }

    console.log('Submitting review:', Object.fromEntries(formData));

    try {
      const res = await fetch('/submit_review', {
        method: 'POST',
        body: formData
      });

      const data = await res.json();
      console.log("Server response:", data);

      if (data.success) {
        alert(data.message);
      } else {
        alert(data.message || "An unknown error occurred while submitting your review.");
      }
    } catch (error) {
      console.error('Error submitting review:', error);
      alert('An error occurred while submitting your review. Please try again later.');
    }
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
