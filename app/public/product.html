<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="/css/style.css" rel="stylesheet">
    
</head>
<body class="d-flex flex-column min-vh-100">
    <div class="techx-navbar">
      <img src="/Techx.png" width="150" height="100" alt="TechX logo">

      <div class="techx-nav-right">
        <a class="techx-nav-link" href="/home">Home</a>
        <a class="techx-nav-link" href="/Polls.html">Polls</a>
        <a class="techx-nav-link" href="/tech">Tech</a>
        <a class="techx-nav-link" href="/Review">Leave a review</a>
        <span></span>
        <div id="loginFormContainer" class="auth">
          <form id="loginForm" class="techx-nav-form">
            <input type="text" placeholder="username" name="username" required>
            <input type="password" placeholder="password" name="password" required>
            <input type="submit" value="Login">
          </form>

          <a class="techx-signup-btn" href="/signup.html">Sign Up</a>
        </div>
      </div>
    </div>

    <div class="container bg-light flex-grow-1 mb-4">
        <div class="row mt-4">
            <div class="col">
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="row g-0">
                            <div class="col-md-6 bg-body-tertiary d-flex align-items-center justify-content-center p-4">
                                <img id="productImg" class="img-fluid rounded" style="max-height: 600px; object-fit: contain;">
                            </div>

                            <div class="col-md-6 d-flex">
                                <div class="p-4 d-flex flex-column w-100">
                                    <h1 id="productName" class="mb-2"></h1>
                                    <p class="mb-3">
                                        <a id="productCategory" class="badge text-bg-secondary text-decoration-none"></a>
                                    </p>
                                    <div class="mt-auto d-flex flex-wrap align-items-center gap-2">
                                        <span id="retailPrice" class="fs-4 fw-bold"></span>
                                        <a id="productLink" class="btn btn-primary">Visit Product Page</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-body border-top">
                        <p id="productDesc" class="text-muted"></p>
                    </div>
                </div>
            </div>            
        </div>
        <div class="row mt-4">
            <div class="col">
                <div class="card shadow-sm mb-3">
                <div class="card-header mb-0 text-white" style="background: linear-gradient(135deg, #3b5bdb, #5f3dc4)">
                    <span class="h5 fw-bold">Reviews</span>
                    <select id="reviewSortSelect" class="form-select form-select-sm float-end w-auto">
                        <option value="high">Highest Rating</option>
                        <option value="low">Lowest Rating</option>
                    </select>
                </div>
                    <div class="card-body">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>
                                        Review
                                    </th>
                                    <th>
                                        Rating
                                    </th>
                                    <th>
                                        User
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="productReviews">
                                <tr id="addReviewRow">
                                    <td>
                                        <textarea class="form-control" id="reviewTextarea" name="review" required></textarea>
                                    </td>
                                    <td>
                                        <input class="form-control" id="ratingInput" name="rating" type="number" placeholder="Rating (1-5)" min="1" max="5" required>
                                    </td>
                                    <td>
                                        <button class="btn btn-primary" id="submitReview">Submit Review</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <p id="submitError"></p>

                        <div class="px-3 pb-3" id="reviewPagination">

                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col">
                <div class="card shadow-sm mb-3">
                    <div class="card-header mb-0 text-white" style="background: linear-gradient(135deg, #3b5bdb, #5f3dc4)">
                        <span class="h5 fw-bold">Product Discussion</span>
                        <select id="threadSortSelect" class="form-select form-select-sm float-end w-auto">
                            <option value="latest_post">Latest Post</option>
                            <option value="oldest_post">Oldest Post</option>
                            <option value="replies_asc">Fewest Replies</option>
                            <option value="replies_desc">Most Replies</option>
                            <option value="latest">Newest Thread</option>
                            <option value="oldest">Oldest Thread</option>
                        </select>
                    </div>
                    <div class="card-body">
                        <div id="createThreadLabel" class="small fw-semibold mb-2" hidden>Start a new topic:</div>
                        <form id="createThreadForm" method="POST" class="border rounded-3 p-3 bg-body-tertiary" hidden>
                            <input type="text" name="title" class="form-control mb-2" /><input type="submit" value="Submit" class="btn btn-primary" />
                        </form>
                    </div>
                    <div class="px-3 pb-3">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th class="w-100">Topics</th><th class="text-nowrap align-middle">Replies</th><th class="text-nowrap">Last Post</th>
                                </tr>
                            </thead>
                            <tbody id="productThreads">

                            </tbody>
                        </table>
                    </div>
                    <div class="px-3 pb-3" id="threadPagination">

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Delete</h5>
            </div>
            <div class="modal-body">
                Are you sure you want to delete this thread? This action cannot be reversed
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="cancelDeleteBtn">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editTitleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Title</h5>
            </div>
            <div class="modal-body">
                <input type="text" class="form-control" id="editTitleText">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirmEditBtn">Confirm</button>
            </div>
            </div>
        </div>
    </div>

    <script src="/js/login-form.js" defer></script>
    <script src="/js/post-editor.js"></script>
    <script>
        const id = window.location.pathname.split('/').pop();

        let maxThreads = 5;
        let maxReviews = 10;

        const params = new URLSearchParams(window.location.search);
        
        const DEFAULTS = {
            thread_sort: "latest_post",
            thread_page: 1,
            review_sort: "high",
            review_page: 1
        };

        const state = {
            thread_page: Number(params.get("thread_page")) || 1,
            review_page: Number(params.get("review_page")) || 1,
            thread_sort: params.get("thread_sort") || "latest_post",
            review_sort: params.get("review_sort") || "high"
        };

        const reviewSortSelect = document.getElementById("reviewSortSelect");
        reviewSortSelect.value = state.review_sort;

        reviewSortSelect.addEventListener("change", (e) => {
            const value = e.target.value;

            state.review_sort = value;
            state.review_page = 1;

            history.replaceState(null, "", `/product/${id}${buildQuery(state)}`);
            loadReviews();
        });

        const threadSortSelect = document.getElementById("threadSortSelect");
        threadSortSelect.value = state.thread_sort;

        threadSortSelect.addEventListener("change", (e) => {
            const value = e.target.value;

            state.thread_sort = value;
            state.thread_page = 1;

            history.replaceState(null, "", `/product/${id}${buildQuery(state)}`);
            loadPosts();
        });

        function buildQuery(params) {
            const search = new URLSearchParams();

            Object.entries(params).forEach(([key, value]) => {
                if(String(value) !== String(DEFAULTS[key]))
                    search.set(key, value);
            });

            const query = search.toString();

            return query ? `?${query}` : "";
        }

        function getLink(params) {
            return `/product/${id}${buildQuery(params)}`;
        }

        function buildPagination(num, max, page, pageKey) {
            const totalPages = Math.ceil(num / max);

            if(totalPages <= 1) return document.createElement("div");

            const pageDiv = document.createElement('div');

            pageDiv.className = "text-center mt-2";

            let html = '';

            if(totalPages <= 5) {
                for(let i=1; i<=totalPages; i++) {
                    let htmlFragment = ''
                    if(i === page) {
                        htmlFragment = `<span class="fw-bold">${i}</span>`;
                    } else {
                        htmlFragment = `<a href="${getLink({...state, [pageKey]: i})}" class="text-decoration-none fw-semibold">${i}</a>`;
                    }

                    if(i !== totalPages)
                        html += htmlFragment + ' ';
                    else
                        html += htmlFragment;
                }
            } else {
                let start = page - 2;
                let end = page + 2;

                if(page !== 1) {
                    html += `<a href="${getLink({...state, [pageKey]: 1})}" class="text-decoration-none"><<</a> `
                    html += `<a href="${getLink({...state, [pageKey]: page - 1})}" class="text-decoration-none"><</a> `;
                }
                
                if(start < 1) {
                    start = 1;
                    end = start + 4;
                }

                if(end > totalPages) {
                    end = totalPages;
                    start = totalPages - 4;
                }

                for(let i=start; i<=end; i++) {
                    let htmlFragment = ''
                    if(i === page) {
                        htmlFragment = `<span class="fw-bold">${i}</span>`;
                    } else {
                        htmlFragment = `<a href="${getLink({...state, [pageKey]: i})}" class="text-decoration-none fw-semibold">${i}</a>`;
                    }

                    if(i !== end)
                        html += htmlFragment + ' ';
                    else
                        html += htmlFragment;
                }

                if(page !== totalPages) {
                    html += ` <a href="${getLink({...state, [pageKey]: page+1})}" class="text-decoration-none">></a> `;
                    html+=  ` <a href="${getLink({...state, [pageKey]: totalPages})}" class="text-decoration-none">>></a> `;
                }
            }

            pageDiv.innerHTML = html;

            return pageDiv;
        }
        
        async function loadReviews() {
            const res = await fetch(`/api/Reviews/${id}`);
            const data = await res.json();

            const reviewTable = document.getElementById("productReviews");

            reviewTable.querySelectorAll("tr:not(#addReviewRow)").forEach(row => row.remove());

            const addReviewRow = document.getElementById("addReviewRow");

            const reviews = data.reviews;

            switch(state.review_sort) {
                case "low":
                    reviews.sort((a, b) => a.Rating - b.Rating);
                    break;
                case "high":
                    reviews.sort((a, b) => b.Rating - a.Rating);
                    break;
                default:
                    break;
            }

            const start = (Number(state.review_page)-1) * maxReviews;
            const reviewsSlice = reviews.slice(start, Math.min(start+maxReviews, reviews.length));

            reviewsSlice.forEach(review => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${review.ProductReview}</td>
                    <td>${review.Rating}</td>
                    <td>${review.UserName}</td>
                `;

                reviewTable.insertBefore(row, addReviewRow);
            });

            let reviewsPagination = buildPagination(reviews.length, maxReviews, state.review_page, "review_page");
            document.getElementById("reviewPagination").innerHTML = '';
            document.getElementById("reviewPagination").appendChild(reviewsPagination);
        }

        async function getSession() {
            const res = await fetch('/api/session');
            const session = await res.json();

            return session;
        }

        let selectedThread = null;

        async function loadPosts() {
            const session = await getSession();

            const res = await fetch(`/threads/${id}`);
            const data = await res.json();

            const createThreadForm = document.getElementById("createThreadForm");
            const createThreadLabel = document.getElementById("createThreadLabel");

            if(session.loggedIn) {
                createThreadForm.hidden = false;
                createThreadForm.action = `/product/${id}/thread`;
                createThreadLabel.hidden = false;
                if(!createThreadForm.querySelector("textarea")) {
                    const postEditor = buildPostEditor();
                    const submitBtn = createThreadForm.querySelector("input[type='submit']");

                    submitBtn.before(postEditor.root);
                }
            }

            const threadTable = document.getElementById("productThreads");
            threadTable.innerHTML = '';

            const threads = data;

            switch(state.thread_sort) {
                case "latest":
                    threads.sort((a, b) => new Date(b.CreationDate) - new Date(a.CreationDate));
                    break;
                case "oldest":
                    threads.sort((a, b) => new Date(a.CreationDate) - new Date(b.CreationDate));
                    break;
                case "replies_asc":
                    threads.sort((a, b) => Number(a.Replies) - Number(b.Replies));
                    break;
                case "replies_desc":
                    threads.sort((a, b) => Number(b.Replies) - Number(a.Replies));
                    break;
                case "oldest_post":
                    threads.sort((a, b) => new Date(a.LastPostDate) - new Date(b.LastPostDate));
                    break;
                case "latest_post":
                    threads.sort((a, b) => new Date(b.LastPostDate) - new Date(a.LastPostDate));
                    break;
                default:
                    break;
            }

            const start = (Number(state.thread_page) - 1) * maxThreads;
            const threadsSlice = threads.slice(start, Math.min(start+maxThreads, threads.length));

            threadsSlice.forEach(thread => {
                const threadRow = document.createElement("tr");
                
                threadRow.innerHTML = `
                    <td>
                        <div><a class="fs-5 text-decoration-none fw-semibold" href="/product/${thread.ProductID}/thread/${thread.ThreadID}">${thread.Title}</a>
                        ${
                            (session.moderatedBoards && session.moderatedBoards.includes(Number(id))) || thread.CreatorID === session.userID ?
                            `<button class="btn btn-link p-0 ms-1 edit-title-btn text-muted" data-thread-id="${thread.ThreadID}" title="Edit">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <button class="btn btn-link p-0 ms-1 delete-btn text-muted" data-thread-id="${thread.ThreadID}" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                            `
                            : '' 
                        }
                        </div>
                        <div>by <span class="fw-semibold">${thread.CreatorName}</span> on <span class="text-muted">${new Date(thread.CreationDate).toLocaleString()}</span></div>
                    </td>
                    <td class="align-middle text-center">${thread.Replies}</td>
                    <td class="text-nowrap">
                        <div>by <span class="fw-semibold">${thread.LastPosterName}</span></div>
                        <div><span class="text-muted">${new Date(thread.LastPostDate).toLocaleString()}</span></div>
                    </td>
                `;

                threadTable.appendChild(threadRow);
            });

            threadTable.querySelectorAll('.edit-title-btn').forEach(btn => {
                btn.addEventListener('click', event => {
                    selectedThread = btn.dataset.threadId;

                    const modal = new bootstrap.Modal(document.getElementById('editTitleModal'));
                    modal.show();
                })
            });

            threadTable.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', event => {
                    selectedThread = btn.dataset.threadId;

                    const modal = new bootstrap.Modal(document.getElementById('confirmDeleteModal'));
                    modal.show();
                })
            });

            let threadPagination = buildPagination(threads.length, maxThreads, state.thread_page, "thread_page");
            document.getElementById("threadPagination").innerHTML = '';
            document.getElementById("threadPagination").appendChild(threadPagination);
        }

        loadPosts();

        document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
            if (!selectedThread) return;

            fetch(`/product/${id}/thread/${selectedThread}`, { method: 'DELETE' })
                .then(() => location.reload());
        });

        const editTitleText = document.getElementById("editTitleText");

        document.getElementById('confirmEditBtn').addEventListener('click', () => {
            if(!selectedThread) return;

            const formData = new FormData();

            formData.append("title", editTitleText.value);

            editTitleText.value = "";

            fetch(`/product/${id}/thread/${selectedThread}`, { 
                method: 'PATCH',
                body: new URLSearchParams(formData) 
            })
                .then(() => location.reload());
        });

        async function loadProduct() {
            const res = await fetch(`/products/${id}`);
            const data = await res.json();

            const product = data.results[0];

            document.getElementById("productImg").src = `/product-images/${product.ProductImage}`;
            document.getElementById("productName").innerText = product.ProductName;
            document.getElementById("productCategory").href = `/tech/${product.CategoryID}`;
            document.getElementById("productCategory").innerText = product.CategoryName;
            document.getElementById("productDesc").innerText = product.ProductDesc;
            document.getElementById("retailPrice").innerText = `$${product.RetailPrice}`;
            document.getElementById("productLink").href = product.ProductLink;

            loadReviews();

            const submitReview = document.getElementById("submitReview");

            submitReview.addEventListener("click", async (e) => {
                const ratingInput =  document.getElementById("ratingInput").value;
                if(ratingInput < 1 || ratingInput > 5) {
                    alert("Rating must be between 1 and 5.");
                    return;
                }
                e.preventDefault();

                const submitError = document.getElementById("submitError");

                const review = document.getElementById("reviewTextarea").value;
                const rating = document.getElementById("ratingInput").value;

                const formData = new FormData();
                formData.append("review_text", review);
                formData.append("rating", rating);
                formData.append("product_id", id);

                const res = await fetch('/submit_review', {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });
                
                const data = await res.json();

                if(!data.success)
                    submitError.innerText = data.message;
                else
                    location.reload();
            });
        }
        loadProduct();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
