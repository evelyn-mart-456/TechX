<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="/css/style.css" rel="stylesheet">
    
</head>
<body class="d-flex flex-column min-vh-100">
    <div class="techx-navbar">
      <img src="/Techx.png" width="150" height="100" alt="TechX logo">

      <div class="techx-nav-right">
        <a class="techx-nav-link" href="/home">Home</a>
        <a class="techx-nav-link" href="/Polls.html">Polls</a>
        <a class="techx-nav-link" href="/tech">Tech</a>
        <a class="techx-nav-link" href="/Review">Leave a review</a>
        <span></span>
        <div id="loginFormContainer" class="auth">
          <form id="loginForm" class="techx-nav-form">
            <input type="text" placeholder="username" name="username" required>
            <input type="password" placeholder="password" name="password" required>
            <input type="submit" value="Login">
          </form>

          <a class="techx-signup-btn" href="/signup.html">Sign Up</a>
        </div>
      </div>
    </div>

    <div class="container bg-light flex-grow-1 mb-4">
        <div class="row">
            <div class="col-md-6 px-0">
                <img id="productImg" class="img-fluid rounded-end" style="max-height: 600px; object-fit: contain;">
            </div>
            <div class="col-md-6 mt-4 d-flex flex-column">
                <h1 id="productName" class="mb-2"></h1>
                <p><a id="productCategory" class="badge text-bg-secondary text-decoration-none mb-3 d-inline-block"></a></p>
                <p class="mb-0 mt-auto">
                    <span id="retailPrice" class="fs-4 me-2 fw-bold"></span><a id="productLink" class="btn btn-primary">Visit Product Page</a>
                </p>
            </div>
        </div>
        <div class="row">
            <div class="col mt-4">
                <p id="productDesc" class="text-muted"></p>
            </div>
        </div>
        <div class="row">
            <div class="col mt-4">
                <table class="table">
                    <thead>
                        <tr>
                            <th>
                                Review
                            </th>
                            <th>
                                Rating
                            </th>
                            <th>
                                User
                            </th>
                        </tr>
                    </thead>
                    <tbody id="productReviews">
                        <tr id="addReviewRow">
                            <td>
                                <textarea id="reviewTextarea" name="review" required></textarea>
                            </td>
                            <td>
                                <input id="ratingInput" name="rating" type="number" placeholder="Rating (1-5)" min="1" max="5" required>
                            </td>
                            <td>
                                <button id="submitReview">Submit Review</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <p id="submitError"></p>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col">
                <div class="card">
                <div class="card-header h5 mb-0 fw-bold">Product Discussion</div>
                <div class="card-body">
                    <form id="createThreadForm" method="POST" hidden>
                        <input type="text" name="title" class="form-control mb-2" /><input type="submit" value="Submit" class="btn btn-primary" />
                    </form>
                </div>
                <div class="px-3 pb-3">
                    <table class="table">
                    <thead>
                        <tr>
                            <th class="w-100">Topics</th><th class="text-nowrap align-middle">Replies</th><th class="text-nowrap">Last Post</th>
                        </tr>
                    </thead>
                    <tbody id="productThreads">

                    </tbody>
                </table>
                </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Delete</h5>
            </div>
            <div class="modal-body">
                Are you sure you want to delete this thread? This action cannot be reversed
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="cancelDeleteBtn">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editTitleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Title</h5>
            </div>
            <div class="modal-body">
                <input type="text" class="form-control" id="editTitleText">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirmEditBtn">Confirm</button>
            </div>
            </div>
        </div>
    </div>

    <script src="/js/login-form.js" defer></script>
    <script src="/js/post-editor.js"></script>
    <script>
        const id = window.location.pathname.split('/').pop();
        
        async function loadReviews(id) {
            const res = await fetch(`/api/Reviews/${id}`);
            const data = await res.json();

            const reviewTable = document.getElementById("productReviews");
            const addReviewRow = document.getElementById("addReviewRow");


            data.reviews.forEach(review => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${review.ProductReview}</td>
                    <td>${review.Rating}</td>
                    <td>${review.UserName}</td>
                `;

                reviewTable.insertBefore(row, addReviewRow);
            });
        }

        async function getSession() {
            const res = await fetch('/api/session');
            const session = await res.json();

            return session;
        }

        async function loadPosts(id) {
            const session = await getSession();

            const res = await fetch(`/threads/${id}`);
            const data = await res.json();

            const createThreadForm = document.getElementById("createThreadForm");

            if(session.loggedIn) {
                createThreadForm.hidden = false;
                createThreadForm.action = `/product/${id}/thread`;
                const postEditor = buildPostEditor();
                const submitBtn = createThreadForm.querySelector("input[type='submit']");

                submitBtn.before(postEditor.root);
            }

            const threadTable = document.getElementById("productThreads");

            data.forEach(thread => {
                const threadRow = document.createElement("tr");
                
                threadRow.innerHTML = `
                    <td>
                        <div><a href="/product/${thread.ProductID}/thread/${thread.ThreadID}">${thread.Title}</a>
                        ${
                            (session.moderatedBoards && session.moderatedBoards.includes(Number(id))) || thread.CreatorID === session.userID ?
                            `<button class="btn btn-link p-0 ms-1 edit-title-btn" data-thread-id="${thread.ThreadID}" title="Edit">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <button class="btn btn-link p-0 ms-1 delete-btn" data-thread-id="${thread.ThreadID}" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                            `
                            : '' 
                        }
                        </div>
                        <div>by ${thread.CreatorName} on ${new Date(thread.CreationDate).toLocaleString()}</div>
                    </td>
                    <td class="align-middle text-center">${thread.Replies}</td>
                    <td class="text-nowrap">
                        <div>by ${thread.LastPosterName}</div>
                        <div>${new Date(thread.LastPostDate).toLocaleString()}</div>
                    </td>
                `;

                threadTable.appendChild(threadRow);
            });

            let selectedThread = null;

            document.querySelectorAll('.edit-title-btn').forEach(btn => {
                btn.addEventListener('click', event => {
                    selectedThread = btn.dataset.threadId;

                    const modal = new bootstrap.Modal(document.getElementById('editTitleModal'));
                    modal.show();
                })
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', event => {
                    selectedThread = btn.dataset.threadId;

                    const modal = new bootstrap.Modal(document.getElementById('confirmDeleteModal'));
                    modal.show();
                })
            });

            document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
                if (!selectedThread) return;

                fetch(`/product/${id}/thread/${selectedThread}`, { method: 'DELETE' })
                    .then(() => location.reload());
            });

            const editTitleText = document.getElementById("editTitleText");

            document.getElementById('confirmEditBtn').addEventListener('click', () => {
                if(!selectedThread) return;

                const formData = new FormData();

                formData.append("title", editTitleText.value);

                editTitleText.value = "";

                fetch(`/product/${id}/thread/${selectedThread}`, { 
                    method: 'PATCH',
                    body: new URLSearchParams(formData) 
                })
                    .then(() => location.reload());
            });
        }

        loadPosts(id);

        async function loadProduct() {
            const res = await fetch(`/products/${id}`);
            const data = await res.json();

            const product = data.results[0];

            document.getElementById("productImg").src = `/product-images/${product.ProductImage}`;
            document.getElementById("productName").innerText = product.ProductName;
            document.getElementById("productCategory").href = `/tech/${product.CategoryID}`;
            document.getElementById("productCategory").innerText = product.CategoryName;
            document.getElementById("productDesc").innerText = product.ProductDesc;
            document.getElementById("retailPrice").innerText = `$${product.RetailPrice}`;
            document.getElementById("productLink").href = product.ProductLink;

            loadReviews(product.ProductID);

            const submitReview = document.getElementById("submitReview");

            submitReview.addEventListener("click", async (e) => {
                const ratingInput =  document.getElementById("ratingInput").value;
                if(ratingInput < 1 || ratingInput > 5) {
                    alert("Rating must be between 1 and 5.");
                    return;
                }
                e.preventDefault();

                const submitError = document.getElementById("submitError");

                const review = document.getElementById("reviewTextarea").value;
                const rating = document.getElementById("ratingInput").value;

                const formData = new FormData();
                formData.append("review_text", review);
                formData.append("rating", rating);
                formData.append("product_id", id);

                const res = await fetch('/submit_review', {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });
                
                const data = await res.json();

                if(!data.success)
                    submitError.innerText = data.message;
                else
                    location.reload();
            });
        }
        loadProduct();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
