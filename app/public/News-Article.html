<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="/css/style.css" rel="stylesheet">
<title>Create Article</title>
<style>
.article {
  width: 400px;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  color: black;

  display: flex;
  flex-direction: column;
  align-items: center;

  margin: 20px auto;
}

</style>
</head>
<body>
  <div class="navbar navbar-expand-lg d-flex align-items-center justify-content-between px-4 py-3">
      <img src="/Techx.png" width="150" height="100" alt="TechX logo">
      <button class="navbar-toggler ms-auto techx-toggler" 
              type="button" 
              data-bs-toggle="collapse" 
              data-bs-target="#techxNav" 
              aria-controls="techxNav" 
              aria-expanded="false" 
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div id="techxNav" class="collapse navbar-collapse">
        <div class="techx-nav-right position-relative d-flex flex-column flex-lg-row align-items-center gap-1 gap-xl-3 ms-auto py-4 px-1 rounded-4">
          <div class="d-flex flex-column flex-lg-row align-items-center gap-1 gap-xl-3">
            <a class="nav-link px-2 py-2 text-dark" href="/home">Home</a>
            <a class="nav-link px-2 py-2 text-dark" href="/Polls.html">Polls</a>
            <a class="nav-link px-2 py-2 text-dark" href="/tech">Tech</a>
            <a class="nav-link px-2 py-2 text-dark" href="/Review">Leave a review</a>
            <a class="nav-link px-2 py-2 text-dark" href="/my-reviews">My reviews</a>
            <a class="nav-link px-2 py-2 text-dark" href="/News-Article.html">News Article</a>
            <a class="nav-link px-2 py-2 text-dark" href="/purchase-history">Purchase History</a>
            <a class="nav-link px-2 py-2 text-dark" href="/shopping-cart"><span class="d-flex align-items-center justify-content-center rounded-circle bg-white">🛒</span></a>
          </div>
          <div id="loginFormContainer" class="d-flex align-items-center">
            <form id="loginForm" class="d-flex flex-row align-items-center gap-1 gap-xl-2 m-0">
              <input class="form-control form-control-sm rounded techx-nav-input" type="text" placeholder="username" name="username" required>
              <input class="form-control form-control-sm rounded techx-nav-input" type="password" placeholder="password" name="password" required>
              <input class="btn btn-sm rounded-3 techx-gradient-btn" type="submit" value="Login">
              <a class="btn btn-sm px-3 py-1 rounded-pill techx-gradient-btn" href="/signup.html">Sign Up</a>
            </form>
          </div>
          <div id="loginError"
               class="text-danger position-absolute end-0 pe-3 text-nowrap"
               style="bottom: 0rem;">
          </div>
        </div>
      </div>
    </div>
<hr>
<div id="articles"></div>
<div class="article">
<h3>Create Article</h3>
<div>
<input type="text" id="articleTitle" placeholder="Title"><br>
<input type="text" id="articleAuthor" placeholder="Author"><br>
<textarea id="articleContent" placeholder="Write your article..." rows="5"></textarea>
<button onclick="createArticle()">Post Article</button>
</div>
<script>
async function createArticle() {
    let title = document.getElementById("articleTitle").value;
    let author = document.getElementById("articleAuthor").value;
    let content = document.getElementById("articleContent").value;

    if (!title || !author || !content) {
        alert("Please fill all fields");
        return;
    }

    const response = await fetch("/createarticle", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ title, author, content })
    });

    if (!response.ok) {
        alert("Failed to create article");
        return;
    }

    alert("Article posted!");
    loadArticles();
}

async function loadArticles() {
    const response = await fetch("/getarticles");
    const data = await response.json();

    let container = document.getElementById("articles");
    if (!container) return;

    container.innerHTML = "";

    data.articles.forEach(article => {
        container.innerHTML += `
            <div class="article">
                <h2>${article.title}</h2>
                <p><strong>${article.author}</strong></p>
                <p>${article.content}</p>
            </div>
        `;
    });
}

loadArticles();
</script>
<script src="/js/login-form.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
