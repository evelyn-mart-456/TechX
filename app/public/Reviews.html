<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #19d7f8, #fd00da);
}
.topnav-right {
float: right;
border: 2px solid  transparent; 
border-radius: 20px;
background-image: linear-gradient(#AFDBF5, #AFDBF5), radial-gradient(circle at top left, #fd00da, #19d7f8);
background-origin: border-box; 
background-clip: content-box, border-box;
}
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 100px; /*height of logo*/
  padding: 0 20px;
}
.center-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  padding-top: calc(100px - 20px); /* Adjust for navbar and padding */
  height: calc(100vh - 100px); /* Adjust for navbar and padding */
}
.review-container {
  background: white;
  padding: 40px;
  width: 350px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
}
h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #42455a;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background: #2f3140;
}
</style>
</head>
<body>

  <div class = "navbar">
<Img src= "Techx.png" width ="150" height ="100">  
<div class="topnav-right">
<a style = "padding-right: 20px; padding-left: 20px; padding: 10px 25px 10px 25px; color: Black;" href  = "/home">Home</a>
<a style = "padding-right: 20px; padding: 10px 25px 10px 25px; color: Black;" href = "/about"> About </a>
<a class ="padding-right padding: 10px 25px 10px 25px; color: Black;" href ="/Review"> Leave a review</a>
</div>
</div> 

  <div class="center-wrapper">
    <div class="review-container">
        <h2>All reviews</h2>
        <div id="reviews"></div>
    </div>
  </div>

  <script>
    async function loadReviews() {
      const res = await fetch('/api/Reviews');
      const data = await res.json();
      
      const container = document.getElementById('reviews');

      if (!data.success) {
        container.innerHTML = `<p>${data.message}</p>`;
        return;
      }
      data.reviews.forEach(review => {
        const div = document.createElement('div');
        div.className = 'review-item';
        div.innerHTML = `
        <div class="product">
          <h3>${review.ProductName}</h3>
          <p>Rating: ${review.Rating}</p>
          <p>${review.ProductReview}</p>
          <hr>
        </div>
        `;
        container.appendChild(div);
      });
    }
    
    loadReviews();
  </script>
</body>
</html>
