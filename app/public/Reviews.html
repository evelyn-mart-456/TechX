<!DOCTYPE html>
<html>
<head>
  <link href="/css/style.css" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #19d7f8, #fd00da);
}
.center-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  padding-top: calc(100px - 20px); /* Adjust for navbar and padding */
  height: calc(100vh - 100px); /* Adjust for navbar and padding */
}
.review-container {
  background: white;
  padding: 40px;
  width: 350px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
}
h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #42455a;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background: #2f3140;
}
</style>
</head>
<body>

  <div class="techx-navbar">
      <img src="/Techx.png" width="150" height="100" alt="TechX logo">

      <div class="techx-nav-right">
        <a class="techx-nav-link" href="/home">Home</a>
        <a class="techx-nav-link" href="Polls.html">Polls</a>
        <a class="techx-nav-link" href="/tech">Tech</a>
        <a class="techx-nav-link" href="/Review">Leave a review</a>
        <span></span>
        <div id="loginFormContainer" class="auth">
          <form id="loginForm" class="techx-nav-form">
            <input type="text" placeholder="username" name="username" required>
            <input type="password" placeholder="password" name="password" required>
            <input type="submit" value="Login">
          </form>

          <a class="techx-signup-btn" href="signup.html">Sign Up</a>
        </div>
      </div>
    </div>

  <div class="center-wrapper">
    <div class="review-container">
        <h2>All reviews</h2>
        <div id="reviews"></div>
    </div>
  </div>
  <script src="/js/login-form.js" defer></script>
  <script>
    async function loadReviews() {
      const res = await fetch('/api/Reviews');
      const data = await res.json();
      
      const container = document.getElementById('reviews');

      if (!data.success) {
        container.innerHTML = `<p>${data.message}</p>`;
        return;
      }
      data.reviews.forEach(review => {
        const div = document.createElement('div');
        div.className = 'review-item';
        div.innerHTML = `
        <div class="product">
          <h3>${review.ProductName}</h3>
          <p>Rating: ${review.Rating}</p>
          <p>${review.ProductReview}</p>
          <hr>
        </div>
        `;
        container.appendChild(div);
      });
    }
    
    loadReviews();
  </script>
</body>
</html>
