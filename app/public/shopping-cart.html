<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="/css/style.css" rel="stylesheet">
    <title>Shopping Cart</title>
</head>
<body class="d-flex flex-column min-vh-100">
    <div class="techx-navbar">
      <img src="/Techx.png" width="150" height="100" alt="TechX logo">

      <div class="techx-nav-right">
        <a class="techx-nav-link" href="/home">Home</a>
        <a class="techx-nav-link" href="/Polls.html">Polls</a>
        <a class="techx-nav-link" href="/tech">Tech</a>
        <a class="techx-nav-link" href="/Review">Leave a review</a>
        <a class="techx-nav-link" href="/my-reviews">My reviews</a>
        <a class="techx-nav-link" href="/purchase-history">Purchase History</a>
        <span></span>
        <div id="loginFormContainer" class="auth">
          <form id="loginForm" class="techx-nav-form">
            <input type="text" placeholder="username" name="username" required>
            <input type="password" placeholder="password" name="password" required>
            <input type="submit" value="Login">
          </form>

          <a class="techx-signup-btn" href="/signup.html">Sign Up</a>
        </div>
      </div>
    </div>

    <div class="container bg-light flex-grow-1 mb-4">
        <h1 class="mt-4 mb-4">Shopping Cart</h1>
        <div id="cartItems">
            <!-- Cart items will be loaded here -->
        </div>
        <div class="mt-4">
            <h3>Shipping Information</h3>
            <form id="shippingForm" class="mb-4">
                <div class="row">
                    <div class="col-md-6">
                        <label for="address" class="form-label">Address</label>
                        <input type="text" class="form-control" id="address" required>
                    </div>
                    <div class="col-md-3">
                        <label for="city" class="form-label">City</label>
                        <input type="text" class="form-control" id="city" required>
                    </div>
                    <div class="col-md-3">
                        <label for="zipCode" class="form-label">Zip Code</label>
                        <input type="text" class="form-control" id="zipCode" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-secondary mt-2">Save Shipping Info</button>
            </form>
            <h3>Total: $<span id="cartTotal">0.00</span></h3>
            <button id="checkoutBtn" class="btn btn-primary">Checkout</button>
        </div>
    </div>

    <script src="/js/login-form.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        // Load cart items
        async function loadCart() {
            try {
                const response = await fetch('/api/cart');
                if (!response.ok) {
                    if (response.status === 401) {
                        document.getElementById('cartItems').innerHTML = '<p>You must be logged in to view your cart. <a href="/login">Login here</a></p>';
                    }
                    return;
                }
                const data = await response.json();
                displayCart(data.items || []);
            } catch (error) {
                console.error('Error loading cart:', error);
                document.getElementById('cartItems').innerHTML = '<p>Error loading cart.</p>';
            }
        }

        function displayCart(items) {
            const cartContainer = document.getElementById('cartItems');
            let total = 0;

            if (!items || items.length === 0) {
                cartContainer.innerHTML = '<p>Your cart is empty.</p>';
                return;
            }

            const table = document.createElement('table');
            table.className = 'table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Subtotal</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cartTableBody"></tbody>
            `;

            const tbody = table.querySelector('#cartTableBody');


            items.forEach(item => {
                const quantity = Number(item.quantity);
                const price = Number(item.price);
                const subtotal = price * quantity;
                total += subtotal;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><img src="/product-images/${item.image}" alt="${item.name}" style="max-width: 100px; max-height: 100px;"></td>
                    <td>${item.name}</td>
                    <td>$${price.toFixed(2)}</td>
                    <td>
                        <input type="number" class="form-control" value="${quantity}" min="1" onchange="updateQuantity(${item.productId}, this.value)">
                    </td>
                    <td>$${subtotal.toFixed(2)}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="removeItem(${item.productId})">Remove</button>
                    </td>
                `;
                tbody.appendChild(row);
                console.log("Cart item:", item);
            });

            cartContainer.innerHTML = '';
            cartContainer.appendChild(table);
            document.getElementById('cartTotal').textContent = total.toFixed(2);
        }

        async function updateQuantity(itemId, quantity) {
            try {
                await fetch(`/api/cart/${itemId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity: parseInt(quantity) })
                });
                loadCart();
            } catch (error) {
                console.error('Error updating quantity:', error);
            }
        }

        async function removeItem(itemId) {
            try {
                await fetch(`/api/cart/${itemId}`, { method: 'DELETE' });
                loadCart();
            } catch (error) {
                console.error('Error removing item:', error);
            }
        }

        async function loadShipping() {
            try {
                const response = await fetch('/api/shipping');
                if (!response.ok) {
                    if (response.status === 401) {
                        document.getElementById('shippingForm').innerHTML = '<p>You must be logged in to enter shipping information. <a href="/login">Login here</a></p>';
                    }
                    return;
                }
                const data = await response.json();
                if (data.shipping) {
                    document.getElementById('address').value = data.shipping.Address;
                    document.getElementById('city').value = data.shipping.City;
                    document.getElementById('zipCode').value = data.shipping.ZipCode;
                }
            } catch (error) {
                console.error('Error loading shipping info:', error);
            }
        }

        document.getElementById('shippingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const address = document.getElementById('address').value;
            const city = document.getElementById('city').value;
            const zipCode = document.getElementById('zipCode').value;

            try {
                const response = await fetch('/api/shipping', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, city, zipCode })
                });
                const data = await response.json();
                if (data.success) {
                    alert('Shipping information saved!');
                } else {
                    alert('Failed to save shipping information: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error saving shipping info:', error);
            }
        });

        document.getElementById('checkoutBtn').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/checkout', { method: 'POST' });
                const data = await response.json();
                if (response.ok) {
                    alert('Checkout successful!');
                    loadCart();
                } else {
                    alert('Checkout failed: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error during checkout:', error);
                alert('Checkout failed: Unable to reach server. Please try again later.');
            }
        });

        loadCart();
        loadShipping();
    </script>
</body>
</html>
