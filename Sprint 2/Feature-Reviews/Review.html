<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #19d7f8, #fd00da);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.review-container {
  background: white;
  padding: 40px;
  width: 350px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
}
h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #42455a;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background: #2f3140;
}
</style>
</head>
<body>
    <div class="review-container">
        <h2>Create Your Review</h2>
        <form id = "reviewForm"> Create your review here
        <input name="product_name" type="text" placeholder="Product Name" required>
        <input name="review_text" type="text" placeholder="Your Review">
        <input name="rating" type="number" placeholder="Rating (1-5)" min="1" max="5" required>
        <button type = "submit">Submit Review</button>
        </div>
    </form>

</body>

<script>
    const reviewForm = document.getElementById('reviewForm');
reviewForm.addEventListener('submit', async function(event) {
    event.preventDefault();

    const formData = new FormData(reviewForm);
    const payload = {
        product_name: formData.get('product_name'),
        review_text: formData.get('review_text'),
        rating: formData.get('rating')
    };
    if(!payload.product_name || !payload.rating || payload.rating < 1 || payload.rating > 5) {
        alert('Please fill in all required fields.');
        return;
    }
    
    console.log('Submitting review:', payload);

const res = await fetch('submit_review.php', {
    method: 'POST',
    headers: {
        'Accept': 'application/json',
        'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
});
console.log('Server response:', res.status);

const data = await res.json().catch(err => {
    console.error('Error parsing JSON:', err);
    alert('An error occurred while submitting your review. Please try again.');
    return;
});
if (data.success) {
    alert('Review submitted successfully!');
} else {
    alert('Failed to submit review. Please try again.');
}
});
</script>
</html>
